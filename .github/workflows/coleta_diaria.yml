name: Coleta diária de notícias de economia

on:
  schedule:
    # Roda todo dia às 09:00 UTC (06:00 horário de Brasília)
    - cron: "0 9 * * *"
  workflow_dispatch: # permite rodar manualmente pela aba Actions do GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install feedparser pandas

      - name: Rodar o scraper
        run: python scraper_diario_com_dedup.py

      - name: Commitar CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias_economia.csv
          git diff --staged --quiet && echo "Nada novo para commitar" || git commit -m "Atualiza noticias_economia.csv"
          git push
